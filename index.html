<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aman Jaiswal — Full Stack Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#f0f4f8;
  --white:#fff;
  --blue:#1d6fea;
  --text:#1e293b;
  --border:#d1dce8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:clamp(14px,2vw,16px);
}

/* NAV */
nav{
  position:fixed;
  top:0; left:0; right:0;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  background:#fff;
  border-bottom:1px solid var(--border);
  z-index:100;
}

.nav-logo{font-weight:800;}

.nav-links{
  display:flex;
  gap:20px;
  list-style:none;
}

.nav-links a{
  text-decoration:none;
  color:#555;
}

.menu-toggle{
  display:none;
  font-size:24px;
  cursor:pointer;
}

/* HERO */
#hero{
  padding-top:80px;
}

.hero-layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  align-items:center;
  padding:40px;
}

.hero-name{
  font-size:clamp(2rem,5vw,4rem);
  font-weight:800;
}

.hero-actions{
  margin-top:20px;
}

.btn{
  padding:10px 20px;
  background:var(--blue);
  color:#fff;
  text-decoration:none;
  border-radius:8px;
}

/* 🔥 AVATAR (BIG SAME STYLE) */
.avatar-wrapper{
  width:230px;
  height:230px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
}

.avatar-wrapper img{
  width:250%;
  height:250%;
  object-fit:cover;
  transform:translate(-30%,-25%);
}

/* SECTION */
.section-wrap{
  padding:60px 40px;
}

.projects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.proj-card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  border:1px solid var(--border);
}

/* CONTACT */
.contact-layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
}

/* 📱 MOBILE */
@media(max-width:768px){

  .menu-toggle{display:block;}

  .nav-links{
    position:absolute;
    top:60px;
    left:0;
    width:100%;
    background:#fff;
    flex-direction:column;
    display:none;
    padding:15px;
  }

  .nav-links.active{
    display:flex;
  }

  .hero-layout{
    grid-template-columns:1fr;
    text-align:center;
  }

  /* KEEP BIG AVATAR (only slightly reduced) */
  .avatar-wrapper{
    width:200px;
    height:200px;
  }

  .avatar-wrapper img{
    width:260%;
    height:260%;
    transform:translate(-32%,-25%);
  }

  .section-wrap{
    padding:40px 20px;
  }

  .contact-layout{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">Aman.</div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <ul class="nav-links">
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-layout">
    
    <div>
      <h1 class="hero-name">Hi, I'm Aman</h1>
      <p>Full Stack Developer · AI · MERN</p>

      <div class="hero-actions">
        <a href="#projects" class="btn">View Projects</a>
      </div>
    </div>

    <div class="avatar-wrapper">
      <img src="images/profile.jpg" alt="Aman"/>
    </div>

  </div>
</section>

<section class="section-wrap" id="projects">
  <h2>Projects</h2>

  <div class="projects-grid">
    <div class="proj-card">
      <h3>V-Count</h3>
      <p>Traffic AI system</p>
    </div>

    <div class="proj-card">
      <h3>TravelMate</h3>
      <p>Booking web app</p>
    </div>
  </div>
</section>

<section class="section-wrap" id="contact">
  <h2>Contact</h2>

  <div class="contact-layout">
    <div>📞 6265324553</div>
    <div>✉️ jaiswalaman9424@gmail.com</div>
  </div>
</section>

<footer>
  <p>© Aman Jaiswal</p>
</footer>

<script>
function toggleMenu(){
  document.querySelector('.nav-links').classList.toggle('active');
}
</script>

</body>
</html>
